<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index</title>
    <style>
        img{
            width: 200px;
            height: 200px;
        }
        .pic{
            position: relative;
        }
        .boy{
            z-index: 2;
        }
        .tube{
            z-index: 1;
            top: -80px;
        }
        .water{
            z-index: 0;
            top: -180px;
        }

        h3::after{
            content: ".pdf";
            color: red;
            background-color: yellow;
        }
        h3::before{
            content: "✓ ";
            color: green;
        }
    </style>
</head>
<body>
    <h3>Z-Index</h3>
    <p>Z-Index controls the stacking order of elements. Elements with a higher Z-Index value will be displayed on top of elements with a lower Z-Index value.</p>
    <p>usually z value = 0</p>
    <div class="box">
        <div class="pic boy"><img src="../images/boy.avif" alt=""></div>
        <div class="pic tube"><img src="../images/tube.jpg" alt=""></div>
        <div class="pic water"><img src="../images/water.jpg" alt=""></div>
    </div>
    <h2>Pseudo Elements</h2>
    <h3>Heading-1</h3>
    <h3>Heading-2</h3>
    <h3>Heading-3</h3>
</body>
</html>
