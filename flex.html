<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <link rel="stylesheet" href="flex.css">
</head>
<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </div>
    <hr>

    <div class="box-container">
        <!-- .box{$}*5 -->
         <div class="box">1</div>
         <div class="box">2</div>
         <div class="box">3</div>
         <div class="box">4</div>
         <div class="box">5</div>
    </div>
    <hr>
    <div class="user-container">
        <!-- .user{user-$}*3 -->
        <div class="user">user-1</div>
        <div class="user">user-2</div>
        <div class="user">user-3</div>
    </div>
    <hr>
    <div class="card-container">
        <div class="card">User-1</div>
        <div class="card">User-2</div>
        <div class="card">User-3</div>
        <div class="card">User-4</div>
        <div class="card">User-5</div>
        <div class="card">User-6</div>
        <div class="card">User-7</div>
        <div class="card">User-8</div>
        <div class="card">User-9</div>
        <div class="card">User-10</div>
        <div class="card">User-11</div>
        <div class="card">User-12</div>
        <div class="card">User-13</div>
        <div class="card">User-14</div>
        <div class="card">User-15</div>
        <div class="card">User-16</div>
        <div class="card">User-17</div>
        <div class="card">User-18</div>
    </div>
    <hr>
</body>
</html>
